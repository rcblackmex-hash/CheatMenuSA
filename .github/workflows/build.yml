name: Compilar CheatMenu SA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Obtener codigo
        uses: actions/checkout@v4

      - name: Instalar NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r25c" >> $GITHUB_ENV

      - name: Descargar ImGui
        run: |
          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_temp
          mkdir -p imgui/backends
          cp imgui_temp/*.h imgui/
          cp imgui_temp/*.cpp imgui/
          cp imgui_temp/backends/imgui_impl_opengl3.h imgui/backends/
          cp imgui_temp/backends/imgui_impl_opengl3.cpp imgui/backends/
          cp imgui_temp/backends/imgui_impl_opengl3.h imgui/
          cp imgui_temp/backends/imgui_impl_opengl3.cpp imgui/

      - name: Crear headers AML
        run: |
          mkdir -p sdk/aml/include/AML
          python3 << 'PYEOF'
          import os
          aml_h = """
          #pragma once
          #include <stdint.h>
          #include <stddef.h>
          #include <dlfcn.h>
          enum class AMLModType { Lib=0, Tool=1, Patcher=2 };
          struct AMLModInfo {
              const char* szGUID;
              const char* szName;
              const char* szVersion;
              AMLModType eType;
              const char* szAuthor;
              const char* szDescription;
          };
          class IAML {
          public:
              virtual ~IAML(){}
              virtual uintptr_t GetLib(const char* n){return 0;}
              virtual void* GetSym(uintptr_t l, const char* s){return nullptr;}
              virtual bool Hook(uintptr_t a, void* f, void** o){return false;}
              virtual void PlaceB(uintptr_t a, uintptr_t d){}
              virtual void PlaceBL(uintptr_t a, uintptr_t d){}
              virtual void PlaceBLX(uintptr_t a, uintptr_t d){}
              virtual void Redirect(uintptr_t a, uintptr_t d){}
              virtual void Write(uintptr_t a, uintptr_t v, size_t s){}
              virtual void Read(uintptr_t a, uintptr_t o, size_t s){}
              virtual bool IsGameVersion(int v){return true;}
              virtual uintptr_t PatternScan(const char* p, const char* m){return 0;}
          };
          #define AML_MOD_DEFINE static AMLModInfo __aml_modinfo =
          """
          arm_h = """
          #pragma once
          #include <stdint.h>
          #include <sys/mman.h>
          inline bool ARMHook(uintptr_t a, void* f, void** o){return false;}
          inline void UnprotectMemory(uintptr_t a, size_t s=0x1000){
              mprotect((void*)(a&~(uintptr_t)0xFFF),s+0x1000,7);
          }
          """
          mem_h = """
          #pragma once
          #include <stdint.h>
          #include <sys/mman.h>
          #include <string.h>
          inline void Unprotect(uintptr_t a, size_t s=0x1000){
              mprotect((void*)(a&~(uintptr_t)0xFFF),s+0x1000,7);
          }
          template<typename T>
          inline void MemWrite(uintptr_t a, T v){
              Unprotect(a,sizeof(T));
              *reinterpret_cast<T*>(a)=v;
          }
          template<typename T>
          inline T MemRead(uintptr_t a){return *reinterpret_cast<T*>(a);}
          """
          open('sdk/aml/include/AML/AML.h','w').write(aml_h)
          open('sdk/aml/include/AML/ARMHook.h','w').write(arm_h)
          open('sdk/aml/include/AML/MemoryMgr.h','w').write(mem_h)
          print('AML headers creados OK')
          PYEOF

      - name: Compilar arm64
        run: |
          mkdir -p build
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DAML_SDK_PATH=$(pwd)/sdk/aml \
            -DIMGUI_PATH=$(pwd)/imgui \
            -DCMAKE_CXX_FLAGS="-I$(pwd)"
          cmake --build build -- -j4

      - name: Buscar el .so
        run: |
          find build -name "*.so" -type f
          SO=$(find build -name "libCheatMenu.so" | head -1)
          echo "SO_FILE=$SO" >> $GITHUB_ENV

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: CheatMenu-SA-v2.10-arm64
          path: ${{ env.SO_FILE }}
          if-no-files-found: warn
