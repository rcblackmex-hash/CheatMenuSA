name: Compilar CheatMenu SA

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # También se puede lanzar manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Obtener código
        uses: actions/checkout@v3

      # 2. Instalar Android NDK
      - name: Instalar Android NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK_PATH=$(pwd)/android-ndk-r25c" >> $GITHUB_ENV
          echo "NDK instalado OK"

      # 3. Descargar ImGui (fuentes necesarias para el menú)
      - name: Descargar ImGui
        run: |
          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_temp
          mkdir -p imgui/backends
          cp imgui_temp/*.h imgui/
          cp imgui_temp/*.cpp imgui/
          cp imgui_temp/backends/imgui_impl_opengl3.h imgui/backends/
          cp imgui_temp/backends/imgui_impl_opengl3.cpp imgui/backends/
          cp imgui_temp/backends/imgui_impl_opengl3.h imgui/
          cp imgui_temp/backends/imgui_impl_opengl3.cpp imgui/
      # 4. Descargar headers de AML (Android Mod Loader)
      - name: Crear headers AML
        run: |
          mkdir -p sdk/aml/include/AML
          cat > sdk/aml/include/AML/AML.h << 'EOF'
          #pragma once
          #include <stdint.h>
          #include <stddef.h>
          #include <dlfcn.h>

          typedef void* (*GetSym_t)(void*, const char*);

          struct AMLInterface {
              void* handle;
              GetSym_t GetSym;
          };

          extern AMLInterface* aml;

          inline void* aml_GetSym(void* lib, const char* sym) {
              return dlsym(lib, sym);
          }
          EOF

          cat > sdk/aml/include/AML/ARMHook.h << 'EOF'
          #pragma once
          #include <stdint.h>
          #include <sys/mman.h>
          #include <string.h>

          inline void ARMHook(uintptr_t addr, void* func, void** orig) {
              // stub — AML maneja hooks en runtime
              (void)addr; (void)func; (void)orig;
          }
          EOF

          cat > sdk/aml/include/AML/MemoryMgr.h << 'EOF'
          #pragma once
          #include <stdint.h>
          #include <sys/mman.h>
          #include <string.h>

          inline void MemWrite(uintptr_t addr, void* data, size_t size) {
              mprotect((void*)(addr & ~0xFFF), 0x1000*2, PROT_READ|PROT_WRITE|PROT_EXEC);
              memcpy((void*)addr, data, size);
          }
          EOF

          echo "Headers AML creados OK"
          ls sdk/aml/include/AML/
          

      # 5. Compilar con CMake + NDK para arm64
      - name: Compilar arm64
        run: |
          mkdir -p build
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=Release \
            -DAML_SDK_PATH=$(pwd)/sdk/aml \
            -DIMGUI_PATH=$(pwd)/imgui \
            -DCMAKE_CXX_FLAGS="-I$(pwd)"
          cmake --build build -- -j4

      # 6. Buscar el .so resultante
      - name: Encontrar el .so
        run: |
          echo "Archivos generados:"
          find build -name "*.so" -type f
          SO_FILE=$(find build -name "libCheatMenu.so" | head -1)
          echo "SO_FILE=$SO_FILE" >> $GITHUB_ENV

      # 7. Subir el .so como artefacto descargable
      - name: Subir libCheatMenu.so
        uses: actions/upload-artifact@v4
        with:
          name: CheatMenu-SA-v2.10-arm64
          path: ${{ env.SO_FILE }}
          retention-days: 30

      # 8. Mostrar resultado
      - name: Resultado
        run: |
          echo "================================"
          echo " CheatMenu SA v2.10 compilado!"
          echo " Descarga el .so desde:"
          echo " GitHub → Actions → Este workflow → Artifacts"
          echo "================================"

          
